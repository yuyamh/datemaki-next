# Vercel本番環境を自動デプロイする設定
# main のブランチに push したとき、自動で Vercel にデプロイ→本番URL発行
name: Vercel Production Deployment

# このワークフローが動くタイミングを指定
# mainブランチにpush（コードをプッシュ）したときに実行
on:
    push:
        branches:
            - main

# 全ジョブ共通の環境変数を定義
env:
    NODE_VERSION: "22.15.0"
    PNPM_VERSION: "10.15.0"

# 権限設定
permissions:
    contents: read
    deployments: write

jobs:
    deploy-production:
        runs-on: ubuntu-latest
        # 1. リポジトリの取得(コードを GitHub から Actions 環境にコピー)
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            # 2. ./.github/actions/setupを実行（Composite Action を再利用）
            - name: Setup environment
              uses: ./.github/actions/setup
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  pnpm-version: ${{ env.PNPM_VERSION }}

            # 3. コマンドライン版の Vercel ツールをインストール
            - name: Install Vercel CLI
              run: pnpm add --global vercel@latest

            # 4. Vercel の環境情報を取得
            # GitHub から Vercel のプロジェクト情報（org, project, token）を使って、本番環境の設定を取得
            - name: Pull Vercel Environment Information
              run:
                  vercel pull --yes --environment=production --token=${{
                  secrets.VERCEL_TOKEN }}
              env:
                  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
                  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

            # 5. 環境変数を設定
            # Vercel の「本番環境」に環境変数 DEBUG_MESSAGE を上書き登録
            # GitHub Secrets から安全に渡す
            - name: Set Vercel Environment Variables
              run: |
                  vercel env rm DEBUG_MESSAGE production --yes --token=${{ secrets.VERCEL_TOKEN }} || true
                  vercel env rm AUTH_SECRET production --yes --token=${{ secrets.VERCEL_TOKEN }} || true
                  vercel env rm DATABASE_URL production --yes --token=${{ secrets.VERCEL_TOKEN }} || true
                  vercel env rm DIRECT_URL production --yes --token=${{ secrets.VERCEL_TOKEN }} || true
                  vercel env rm NEXT_PUBLIC_SUPABASE_URL production --yes --token=${{ secrets.VERCEL_TOKEN }} || true
                  vercel env rm NEXT_PUBLIC_SUPABASE_ANON_KEY production --yes --token=${{ secrets.VERCEL_TOKEN }} || true
                  vercel env rm SUPABASE_SERVICE_ROLE_KEY production --yes --token=${{ secrets.VERCEL_TOKEN }} || true
                  echo "${{ secrets.PROD_DEBUG_MESSAGE }}" | vercel env add DEBUG_MESSAGE production --token=${{ secrets.VERCEL_TOKEN }}
                  echo "${{ secrets.PROD_AUTH_SECRET }}" | vercel env add AUTH_SECRET production --token=${{ secrets.VERCEL_TOKEN }}
                  echo "${{ secrets.PROD_DATABASE_URL }}" | vercel env add DATABASE_URL production --token=${{ secrets.VERCEL_TOKEN }}
                  echo "${{ secrets.PROD_DIRECT_URL }}" | vercel env add DIRECT_URL production --token=${{ secrets.VERCEL_TOKEN }}
                  echo "${{ secrets.PROD_NEXT_PUBLIC_SUPABASE_URL }}" | vercel env add NEXT_PUBLIC_SUPABASE_URL production --token=${{ secrets.VERCEL_TOKEN }}
                  echo "${{ secrets.PROD_NEXT_PUBLIC_SUPABASE_ANON_KEY }}" | vercel env add NEXT_PUBLIC_SUPABASE_ANON_KEY production --token=${{ secrets.VERCEL_TOKEN }}
                  echo "${{ secrets.PROD_SUPABASE_SERVICE_ROLE_KEY }}" | vercel env add SUPABASE_SERVICE_ROLE_KEY production --token=${{ secrets.VERCEL_TOKEN }}
              env:
                  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
                  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

            # 6. 設定の確認
            # 実際に Vercel 側に反映された環境変数をリスト出力(デバッグや確認用)
            - name: Verify Vercel Environment Variables
              run: |
                  echo "Listing Vercel environment variables:"
                  vercel env ls production --token=${{ secrets.VERCEL_TOKEN }}
              env:
                  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
                  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

            # 7. Prisma migrateを実施
            - name: Run Prisma Migrations
              run: pnpm prisma migrate deploy
              env:
                  DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
                  DIRECT_URL: ${{ secrets.PROD_DIRECT_URL }}

            # 8. Prisma generate
            - name: Generate Prisma Client
              run: pnpm prisma generate
              env:
                  DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
                  DIRECT_URL: ${{ secrets.PROD_DIRECT_URL }}

            # 9. Prisma seed を実行
            - name: Run Prisma Seed
              run: pnpm prisma db seed
              env:
                  DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
                  DIRECT_URL: ${{ secrets.PROD_DIRECT_URL }}

            # 10. ビルド
            # Vercel のサーバーに送る前にGitHub Actions 上の一時的な仮想環境（＝Ubuntuのサーバー）で構築
            - name: Build Project Artifacts
              run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
              env:
                  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
                  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
                  DEBUG_MESSAGE: ${{ secrets.PROD_DEBUG_MESSAGE }}
                  AUTH_SECRET: ${{ secrets.PROD_AUTH_SECRET }}
                  DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
                  DIRECT_URL: ${{ secrets.PROD_DIRECT_URL }}
                  NEXT_PUBLIC_SUPABASE_URL:
                      ${{ secrets.PROD_NEXT_PUBLIC_SUPABASE_URL }}
                  NEXT_PUBLIC_SUPABASE_ANON_KEY:
                      ${{ secrets.PROD_NEXT_PUBLIC_SUPABASE_ANON_KEY }}
                  SUPABASE_SERVICE_ROLE_KEY:
                      ${{ secrets.PROD_SUPABASE_SERVICE_ROLE_KEY }}

            # 11. デプロイ
            # ビルド済みファイルをアップロードして本番URLを発行（本番環境）
            - name: Deploy Project Artifacts to Vercel
              run:
                  vercel deploy --prebuilt --prod --token=${{
                  secrets.VERCEL_TOKEN }}
              env:
                  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
                  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
                  DEBUG_MESSAGE: ${{ secrets.PROD_DEBUG_MESSAGE }}
                  AUTH_SECRET: ${{ secrets.PROD_AUTH_SECRET }}
                  DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
                  DIRECT_URL: ${{ secrets.PROD_DIRECT_URL }}
                  NEXT_PUBLIC_SUPABASE_URL:
                      ${{ secrets.PROD_NEXT_PUBLIC_SUPABASE_URL }}
                  NEXT_PUBLIC_SUPABASE_ANON_KEY:
                      ${{ secrets.PROD_NEXT_PUBLIC_SUPABASE_ANON_KEY }}
                  SUPABASE_SERVICE_ROLE_KEY:
                      ${{ secrets.PROD_SUPABASE_SERVICE_ROLE_KEY }}
